<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Elias — Portfolio</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">Elias — Portfolio</h1>
      <p class="site-sub">Games · Software · Experience</p>
    </div>
  </header>

  <main class="container">
    <section class="filters" aria-label="Filters">
      <button data-filter="all" class="filter-btn active" aria-pressed="true" aria-controls="projects">All</button>
      <button data-filter="game" class="filter-btn" aria-pressed="false" aria-controls="projects">Games</button>
      <button data-filter="software" class="filter-btn" aria-pressed="false" aria-controls="projects">Software</button>
      <button data-filter="experience" class="filter-btn" aria-pressed="false" aria-controls="projects">Experience</button>
    </section>

    <section id="projects" class="grid" aria-live="polite">
      <!-- Cards rendered by scripts/main.js from data/projects.json -->
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© Elias — <a href="https://github.com/eliaslehtinen">GitHub</a></div>
  </footer>

  <!-- Modal -->
  <div id="modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop" data-dismiss></div>
    <div class="modal-panel" role="document">
      <button class="modal-close" aria-label="Close">✕</button>
      <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-meta" class="muted"></p>
        <p id="modal-role" class="modal-role muted"></p>
        <div id="modal-team" class="modal-team"></div>
        <div id="modal-media" class="media"></div>
        <p id="modal-desc"></p>
        <ul id="modal-tasks" class="modal-tasks"></ul>
        <div id="modal-links" class="modal-links"></div>
      </div>
    </div>
  </div>

  <script src="scripts/main.js"></script>
</body>
</html>
